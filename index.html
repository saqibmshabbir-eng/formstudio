<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Studio — University of Leicester</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Skip navigation link — visible only on focus, for keyboard/SR users -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- Screen-reader live region — announces page navigation and status changes -->
<div id="sr-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<!-- Toast container — assertive so errors are announced immediately -->
<div id="toast-container" aria-live="assertive" aria-atomic="false"></div>

<!-- Modal overlay -->
<div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-sr" hidden>
  <div id="modal" class="modal">
    <div id="modal-content"></div>
  </div>
</div>

<!-- App root -->
<div id="app"></div>

<!-- DOMPurify — sanitises InfoText HTML before rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

<!-- JavaScript — load order matters -->
<script src="config.js"></script>
<script src="state.js"></script>
<script src="ui.js"></script>
<script src="auth.js"></script>
<script src="graph.js"></script>
<script src="utils.js"></script>
<script src="nav.js"></script>
<script src="home.js"></script>
<script src="builder.js"></script>
<script src="admin.js"></script>
<script src="live-form.js"></script>
<script src="my-forms.js"></script>
<script src="submissions.js"></script>

<!-- MSAL — loaded last so all app code is defined first -->
<script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"
  onerror="this.onerror=null;this.src='https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js'"
  onload="startApp()"></script>
</body>
</html>
